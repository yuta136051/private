<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8EF7"/>
      <stop offset="100%" stop-color="#34C9A3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Calendar body -->
  <rect x="104" y="160" width="304" height="256" rx="24" fill="white" opacity="0.95"/>

  <!-- Calendar header bar -->
  <rect x="104" y="160" width="304" height="80" rx="24" fill="white" opacity="0.95"/>
  <rect x="104" y="200" width="304" height="40" fill="white" opacity="0.95"/>

  <!-- Header colored band -->
  <rect x="104" y="160" width="304" height="72" rx="24" fill="#4F8EF7" opacity="0.9"/>
  <rect x="104" y="196" width="304" height="36" fill="#4F8EF7" opacity="0.9"/>

  <!-- Ring pegs -->
  <rect x="184" y="128" width="28" height="64" rx="14" fill="white" opacity="0.9"/>
  <rect x="300" y="128" width="28" height="64" rx="14" fill="white" opacity="0.9"/>

  <!-- Calendar title dots (header) -->
  <circle cx="200" cy="192" r="8" fill="white" opacity="0.7"/>
  <circle cx="256" cy="192" r="8" fill="white" opacity="0.7"/>
  <circle cx="312" cy="192" r="8" fill="white" opacity="0.7"/>

  <!-- Grid dots representing days -->
  <circle cx="168" cy="276" r="10" fill="#4F8EF7" opacity="0.3"/>
  <circle cx="216" cy="276" r="10" fill="#4F8EF7" opacity="0.3"/>
  <circle cx="264" cy="276" r="10" fill="#4F8EF7" opacity="0.3"/>
  <circle cx="312" cy="276" r="10" fill="#4F8EF7" opacity="0.3"/>
  <circle cx="360" cy="276" r="10" fill="#4F8EF7" opacity="0.3"/>

  <circle cx="168" cy="324" r="10" fill="#4F8EF7" opacity="0.3"/>
  <circle cx="216" cy="324" r="10" fill="#4F8EF7" opacity="0.3"/>
  <circle cx="264" cy="324" r="10" fill="#34C9A3" opacity="0.8"/>
  <circle cx="312" cy="324" r="10" fill="#34C9A3" opacity="0.8"/>
  <circle cx="360" cy="324" r="10" fill="#4F8EF7" opacity="0.3"/>

  <circle cx="168" cy="372" r="10" fill="#4F8EF7" opacity="0.3"/>
  <circle cx="216" cy="372" r="10" fill="#4F8EF7" opacity="0.3"/>
  <circle cx="264" cy="372" r="10" fill="#4F8EF7" opacity="0.3"/>
  <circle cx="312" cy="372" r="10" fill="#4F8EF7" opacity="0.3"/>
  <circle cx="360" cy="372" r="10" fill="#4F8EF7" opacity="0.3"/>

  <!-- Checkmark badge (bottom right) -->
  <circle cx="372" cy="372" r="56" fill="#34C9A3"/>
  <polyline points="346,372 364,390 400,354" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
